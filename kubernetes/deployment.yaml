apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-microservice
  namespace: default
  labels:
    app: sample-microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-microservice
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: sample-microservice
    spec:
      containers:
        - name: sample-microservice
          image: acrdelphidevuaen001.azurecr.io/sample-microservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: KEY_VAULT_URI
              value: "https://kv-delphi-dev-uaen-001.vault.azure.net/"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: app-storage
              mountPath: /app/data
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: sample-microservice-pvc
