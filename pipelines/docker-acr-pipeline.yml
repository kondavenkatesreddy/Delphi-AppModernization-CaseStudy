# Build the microservice container image and push to ACR.
# Used for the AKS deployment path (kubernetes/ manifests).

trigger:
  branches:
    include: [ main ]
  paths:
    include: [ sample-app/* ]

variables:
  acrName: 'acrdelphidevuaen001'
  imageRepository: 'sample-microservice'
  dockerfilePath: 'sample-app/Delphi.SampleApi/Dockerfile'
  buildContext: 'sample-app/Delphi.SampleApi'
  tag: '$(Build.BuildId)'
  acrServiceConnection: 'delphi-acr-sc'

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: Docker@2
  displayName: Build and push image to ACR
  inputs:
    containerRegistry: '$(acrServiceConnection)'
    repository: '$(imageRepository)'
    command: buildAndPush
    Dockerfile: '$(dockerfilePath)'
    buildContext: '$(buildContext)'
    tags: |
      $(tag)
      latest
