# Terraform infrastructure pipeline for Azure DevOps.
# Runs init/validate/plan, then apply.

trigger:
  branches:
    include: [ main ]
  paths:
    include: [ terraform/* ]

pool:
  vmImage: ubuntu-latest

variables:
  workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
  serviceConnection: 'Delphi-Azure-connection'
  tfVarFile: 'vars/prod.tfvars'  # use vars/dev.tfvars or vars/uat.tfvars for lower environments

steps:
- checkout: self

- task: Bash@3
  displayName: Install Terraform
  inputs:
    targetType: 'inline'
    script: |
      set -e
      if ! command -v terraform >/dev/null 2>&1; then
        sudo apt-get update
        sudo apt-get install -y curl unzip gnupg lsb-release
        curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt-get update
        sudo apt-get install -y terraform
      fi
      terraform version

- task: AzureCLI@2
  displayName: Terraform Init & Validate
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: bash
    scriptLocation: inlineScript
    workingDirectory: $(workingDirectory)
    addSpnToEnvironment: true
    inlineScript: |
      set -e
      export ARM_CLIENT_ID=$servicePrincipalId
      export ARM_CLIENT_SECRET=$servicePrincipalKey
      export ARM_TENANT_ID=$tenantId
      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
      terraform init
      terraform validate

- task: AzureCLI@2
  displayName: Terraform Plan
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: bash
    scriptLocation: inlineScript
    workingDirectory: $(workingDirectory)
    addSpnToEnvironment: true
    inlineScript: |
      set -e
      export ARM_CLIENT_ID=$servicePrincipalId
      export ARM_CLIENT_SECRET=$servicePrincipalKey
      export ARM_TENANT_ID=$tenantId
      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
      terraform plan -var-file=$(tfVarFile) -out=tfplan

- task: AzureCLI@2
  displayName: Terraform Apply
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: bash
    scriptLocation: inlineScript
    workingDirectory: $(workingDirectory)
    addSpnToEnvironment: true
    inlineScript: |
      set -e
      export ARM_CLIENT_ID=$servicePrincipalId
      export ARM_CLIENT_SECRET=$servicePrincipalKey
      export ARM_TENANT_ID=$tenantId
      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
      terraform apply -auto-approve tfplan
